services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: skindit
      POSTGRES_PASSWORD: skindit1234
      POSTGRES_DB: skindit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skindit"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://skindit:skindit1234@db:5432/skindit
      NEXTAUTH_URL: http://localhost:3000
    env_file:
      - ./apps/web/.env.local

volumes:
  pgdata:
